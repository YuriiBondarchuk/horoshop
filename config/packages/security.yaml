# config/packages/security.yaml
security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            id: App\Security\UserJwtUserProvider

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # точний firewall для логіну/публічного створення користувача
        users_login:
            pattern: ^/v1/api/users/login$
            security: false

        api:
            pattern: ^/v1/api
            stateless: true
            provider: app_user_provider
            jwt: ~

    access_control:
        - { path: ^/v1/api/users/login$, methods: [POST], roles: PUBLIC_ACCESS }
        - { path: ^/v1/api, roles: IS_AUTHENTICATED_FULLY }
